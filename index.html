<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        textarea {
            width: 60%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            resize: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: purple;
            color: white;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        button:hover {
            background: darkviolet;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            background: white;
            padding: 15px;
            display: inline-block;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>Sentiment Analysis App</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter text " required></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if sentiment %}
    <div class="result">
        <p><b>Sentiment:</b> {{ sentiment }}</p>
        <p><b>Polarity:</b> {{ polarity }}</p>
        <p><b>Subjectivity:</b> {{ subjectivity }}</p>
    </div>
    {% endif %}

</body>
</html>
